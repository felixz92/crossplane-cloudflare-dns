apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: InjectedIdentity
---
# Make sure provider-kubernetes has enough permissions to install your objects into cluster
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: crossplane-contrib-provider-kubernetes
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.16.2
  runtimeConfigRef:
    apiVersion: pkg.crossplane.io/v1beta1
    kind: DeploymentRuntimeConfig
    name: provider-kubernetes
---
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-kubernetes
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-kubernetes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-cluster-admin
subjects:
  - kind: ServiceAccount
    name: provider-kubernetes
    namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-terraform
spec:
  package: xpkg.upbound.io/upbound/provider-terraform:v0.19.2
---
apiVersion: tf.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: cloudflare-terraform
spec:
  credentials:
    - secretRef:
        key: token
        name: cloudflare-credentials
        namespace: crossplane-system
      source: Secret
      filename: cloudflare-api-token
    - secretRef:
        key: email
        name: cloudflare-credentials
        namespace: crossplane-system
      source: Secret
      filename: cloudflare-email
  configuration: |
    terraform {
      required_providers {
        cloudflare = {
          source  = "cloudflare/cloudflare"
          version = "~> 4.0"
        }
      }
    }
    
    provider "cloudflare" {
      api_key = file("cloudflare-api-token")
      email = file("cloudflare-email")
    }

    // Modules _must_ use remote state. The provider does not persist state.
    terraform {
      backend "kubernetes" {
        secret_suffix     = "providerconfig-cloudflare-terraform"
        namespace         = "crossplane-system"
        in_cluster_config = true
      }
    }
